<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>ABM Crew App</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
  body { font-family: Arial; margin: 0; }
  #login { padding: 20px; }
  #app { display: none; }
  .card { background: #eee; margin: 10px; padding: 10px; border-radius: 8px; }
</style>
</head>
<body>

<div id="login">
  <h2>Login</h2>
  <input id="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Password"><br>
  <button id="loginBtn">Login</button>
  <div id="loginMsg"></div>
</div>

<div id="app">
  <button id="logoutBtn">Logout</button>
  <h2>Dashboard</h2>
  <div id="cards"></div>
</div>

<script>
document.getElementById("loginBtn").onclick = function () {
  const email = document.getElementById("email").value.toLowerCase();
  const password = document.getElementById("password").value;

  if (!email.endsWith("@abm.com")) return loginMsg.innerText="Use @abm.com";
  if (password !== "Adminbrs1") return loginMsg.innerText="Wrong password";

  localStorage.setItem("userEmail", email);
  login.style.display="none";
  app.style.display="block";
};

document.getElementById("logoutBtn").onclick = function(){
  localStorage.clear();
  location.reload();
};

if(localStorage.getItem("userEmail")){
  login.style.display="none";
  app.style.display="block";
}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, set, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCCehxMag_g2wXh7WzruvZyt9kdSJI4OpI",
  authDomain: "crew-app-e1315.firebaseapp.com",
  databaseURL: "https://crew-app-e1315-default-rtdb.europe-west1.firebasedatabase.app/",
  projectId: "crew-app-e1315",
  storageBucket: "crew-app-e1315.firebasestorage.app",
  messagingSenderId: "320647227664",
  appId: "1:320647227664:web:8de65c96c509d819a7dd95"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ✅ FIXED HERE
const pickupsRef = ref(db, "pickup1");

let pickupsData = {};

function render(){
  const cards = document.getElementById("cards");
  cards.innerHTML = "";

  console.log("Rendering:", pickupsData);

  Object.entries(pickupsData).forEach(([id,p])=>{
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <b>${p.flightNumber}</b><br>
      ${p.type} - Stand ${p.stand}<br>
      Status: ${p.status}<br>
      <button onclick="complete('${id}')">Complete</button>
    `;

    cards.appendChild(card);
  });

  if(cards.innerHTML===""){
    cards.innerHTML="<p>No data found</p>";
  }
}

window.complete=function(id){
  update(ref(db,"pickup1/"+id),{
    status:"Completed"
  });
};

// 🔥 DEBUG
onValue(pickupsRef, snap=>{
  const data = snap.val();

  console.log("🔥 Firebase data:", data);

  if(data === null){
    console.log("No data → creating sample");

    const sample = {
      test1:{flightNumber:"AB123",type:"Passenger",stand:"5A",status:"Pending"},
      test2:{flightNumber:"CD456",type:"Cargo",stand:"2B",status:"Pending"}
    };

    set(pickupsRef, sample);
    pickupsData = sample;
  } else {
    pickupsData = data;
  }

  render();
}, err=>{
  console.error("Firebase error:", err);
});
</script>

</body>
</html>
