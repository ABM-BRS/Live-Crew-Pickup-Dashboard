<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ABM Crew App - Live PWA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Favicon -->
<link rel="icon" type="image/png" href="icon.png">

<!-- PWA manifest -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#007bff">

<style>
body { font-family: Arial, sans-serif; margin:0; background:#f4f6f8; }
#login { padding:20px; max-width:400px; margin:auto; }
input { width:100%; padding:12px; margin:8px 0; font-size:16px; border-radius:6px; border:1px solid #ccc; }
button { width:100%; padding:12px; margin-top:10px; background:#007bff; color:white; border:none; border-radius:8px; font-size:16px; cursor:pointer; }
button:hover { background:#0056b3; }
#app { display:none; }
header { background:#007bff; color:white; padding:14px; text-align:center; font-size:20px; font-weight:bold; }
.tabs { display:flex; margin-top:10px; }
.tab { flex:1; padding:12px; text-align:center; background:#ddd; cursor:pointer; font-weight:bold; }
.tab.active { background:white; color:#007bff; border-top-left-radius:8px; border-top-right-radius:8px; }
#cards { padding:10px; }
.card { background:white; margin-bottom:12px; padding:12px; border-radius:12px; box-shadow:0 2px 5px rgba(0,0,0,0.1); font-size:16px; }
.card b { font-size:18px; }
.card .status { display:inline-block; padding:6px 10px; border-radius:10px; font-weight:bold; margin-top:6px; }
.pending { background:#ffc107; color:black; }
.completed { background:#28a745; color:white; }
.card button { width:48%; margin:4px 1%; font-size:14px; }
#installBtn { display:none; width:95%; margin:10px auto; padding:12px; background:#007bff; color:white; border:none; border-radius:8px; font-size:16px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <h2>ABM Login</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button id="loginBtn">Login</button>
  <div id="loginMsg"></div>
</div>

<!-- APP -->
<div id="app">
  <header>Pickup Dashboard</header>
  <button id="installBtn">📲 Install App</button>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('live', this)">Live</div>
    <div class="tab" onclick="switchTab('completed', this)">Completed</div>
  </div>
  <div id="cards"></div>
</div>

<!-- LOGIN SCRIPT -->
<script>
// LOGIN FUNCTION
function login() {
  const email = document.getElementById("email").value.trim().toLowerCase();
  const password = document.getElementById("password").value;

  if(!email.endsWith("@abm.com")){
    document.getElementById("loginMsg").innerHTML = "<p style='color:red;'>Use your @abm.com email</p>"; 
    return;
  }
  if(password !== "Adminbrs1"){
    document.getElementById("loginMsg").innerHTML = "<p style='color:red;'>Wrong password</p>"; 
    return;
  }

  // store session
  localStorage.setItem("userEmail", email);
  const role = ["manager@abm.com","supervisor@abm.com"].includes(email) ? "admin" : "crew";
  localStorage.setItem("role", role);

  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";
  render();
}

// AUTO-LOGIN & BUTTON ATTACH
window.addEventListener("DOMContentLoaded", () => {
  const storedUser = localStorage.getItem("userEmail");
  if(storedUser){
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";
  }

  // Attach button listener
  document.getElementById("loginBtn").addEventListener("click", login);
});
</script>

<!-- FIREBASE MODULE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "https://YOUR_PROJECT-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const pickupsRef = ref(db, "pickups");

let pickupsData = {};
let currentTab = "live";
let deferredPrompt;

// ----- SWITCH TAB -----
window.switchTab = function(tab, el){
  currentTab = tab;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");
  render();
}

// ----- RENDER FUNCTION -----
function render(){
  const cards = document.getElementById("cards");
  cards.innerHTML = "";
  const userEmail = localStorage.getItem("userEmail");
  const role = localStorage.getItem("role") || "crew";

  Object.entries(pickupsData).forEach(([key,p])=>{
    if(role==="crew" && p.assignedCrew !== userEmail) return;
    if(currentTab==="live" && p.status !== "Pending") return;
    if(currentTab==="completed" && p.status !== "Completed") return;

    const card = document.createElement("div");
    card.className="card";
    card.innerHTML=`
      <b>${p.flightNumber}</b><br>
      ${p.type} - Stand ${p.stand}<br>
      Crew: ${p.crew}<br>
      Assigned: ${p.assignedCrew||"(none)"}<br>
      Start: ${p.startTime||""} ${p.endTime ? "| End: "+p.endTime : ""}<br>
      Status: <span class="status ${p.status==="Completed"?"completed":"pending"}">${p.status}</span><br>
      ${((role==="admin")||(role==="crew" && p.status==="Pending"))?
        `<button onclick="completePickup('${key}')">Complete</button>`:""
      }
      ${role==="admin" && currentTab==="live"?
        `<button onclick="assignCrew('${key}')">Assign Crew</button>`:""
      }
    `;
    cards.appendChild(card);
  });
}

// ----- COMPLETE PICKUP -----
window.completePickup = function(id){
  const now = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  update(ref(db,"pickups/"+id), { status:"Completed", endTime: now });
}

// ----- ASSIGN CREW -----
window.assignCrew = function(id){
  const crewEmail = prompt("Enter crew email (@abm.com only)");
  if(!crewEmail || !crewEmail.endsWith("@abm.com")) return alert("Invalid @abm.com email");
  update(ref(db,"pickups/"+id), { assignedCrew: crewEmail, status:"Pending" });
}

// ----- REALTIME DATABASE -----
onValue(pickupsRef, snapshot=>{
  pickupsData = snapshot.val() || {};
  if(document.getElementById("app").style.display==="block"){
    render();
  }
});

// ----- INSTALL BUTTON -----
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBtn').style.display = 'block';
});
document.getElementById('installBtn').onclick = async () => {
  deferredPrompt.prompt();
  deferredPrompt = null;
}

// ----- SERVICE WORKER -----
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./service-worker.js')
    .then(()=>console.log('Service Worker registered'));
}
</script>

</body>
</html>
