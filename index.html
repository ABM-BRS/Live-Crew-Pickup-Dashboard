<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Airport Pickup Dispatch Dashboard</title>

<!-- ✅ Mobile responsive -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ✅ PWA Manifest -->
<link rel="manifest" href="manifest.json">

<!-- ✅ Theme colour (controls app bar colour on install) -->
<meta name="theme-color" content="#007bff">

<!-- ✅ iPhone icon support -->
<link rel="apple-touch-icon" href="favicon-192.png">

<style>
body { font-family: Arial; background: #f4f6f8; padding: 20px; max-width: 1200px; margin: auto; }
h1 { text-align: center; }
table { width: 100%; border-collapse: collapse; margin-top: 20px; }
th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
th { background: #007bff; color: white; }
button.complete-btn { background: #28a745; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; }
button.complete-btn:hover { background: #218838; }
</style>
</head>

<body>
<h1>Airport Pickup Dispatch Dashboard</h1>

<table>
  <thead>
    <tr>
      <th>Flight</th>
      <th>Type</th>
      <th>Stand</th>
      <th>Start Date</th>
      <th>Start Time</th>
      <th>Completed Date</th>
      <th>Completed Time</th>
      <th>Crew</th>
      <th>Status</th>
      <th>Duration (min)</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody id="dashboard-body"></tbody>
</table>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCCehxMag_g2wXh7WzruvZyt9kdSJI4OpI",
  authDomain: "crew-app-e1315.firebaseapp.com",
  databaseURL: "https://crew-app-e1315-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "crew-app-e1315",
  storageBucket: "crew-app-e1315.firebasestorage.app",
  messagingSenderId: "320647227664",
  appId: "1:320647227664:web:8de65c96c509d819a7dd95"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const pickupsRef = ref(db, "pickups1");
const tbody = document.getElementById("dashboard-body");

// Google Sheets endpoint
const SHEETS_URL = "https://script.google.com/macros/s/AKfycbwst8TZc5AwsLHg1GFhIqT_ca-CcfG-SBB4kRuBTRJ32jLCDWTVYgu4WCb7_srBQcUiUQ/exec";

let pickupsData = {};

onValue(pickupsRef, snapshot => {
  pickupsData = snapshot.val() || {};
  renderTable();
});

function renderTable(){
  tbody.innerHTML = "";
  for(const key in pickupsData){
    const p = pickupsData[key];
    const startTime = p.pickupTime ? new Date(p.pickupTime) : null;
    const completedTime = p.completedTime ? new Date(p.completedTime) : null;
    const duration = (startTime && completedTime) ? Math.floor((completedTime - startTime)/60000) : 0;

    const startDate = startTime ? startTime.toISOString().split("T")[0] : "";
    const startClock = startTime ? startTime.toISOString().split("T")[1].substring(0,5) : "";
    const completedDate = completedTime ? completedTime.toISOString().split("T")[0] : "";
    const completedClock = completedTime ? completedTime.toISOString().split("T")[1].substring(0,5) : "";

    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${p.flightNumber||""}</td>
      <td>${p.type||""}</td>
      <td>${p.stand||""}</td>
      <td>${startDate}</td>
      <td>${startClock}</td>
      <td>${completedDate}</td>
      <td>${completedClock}</td>
      <td>${p.crew||""}</td>
      <td>${p.status||""}</td>
      <td>${duration}</td>
      <td>${p.status==="Pending"?`<button class="complete-btn" onclick="completePickup('${key}')">Complete</button>`:""}</td>
    `;
    tbody.appendChild(tr);

    fetch(SHEETS_URL, {
      method: "POST",
      body: JSON.stringify({
        id: key,
        flightNumber: p.flightNumber,
        type: p.type,
        stand: p.stand,
        startDate: startDate,
        startTime: startClock,
        completedDate: completedDate,
        completedTime: completedClock,
        crew: p.crew,
        status: p.status,
        duration: duration
      })
    }).catch(console.warn);
  }
}

window.completePickup = async function(id){
  const now = new Date().toISOString();
  const start = pickupsData[id].pickupTime;
  const duration = start ? Math.floor((new Date(now)-new Date(start))/60000) : 0;

  await update(ref(db,"pickups1/"+id), {
    status: "Completed",
    completedTime: now,
    duration: duration
  });
};
</script>

</body>
</html>
