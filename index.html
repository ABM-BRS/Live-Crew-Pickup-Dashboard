<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Airport Pickup Dispatch</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#007bff">
<link rel="apple-touch-icon" href="favicon-192.png">

<style>
body { 
  font-family: Arial; 
  background: #f4f6f8; 
  margin: 0;
  padding: 10px;
}

h1 { 
  text-align: center; 
  font-size: 20px; 
}

/* Install button */
#installBtn {
  display: none;
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  background: #007bff;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 16px;
}

/* Cards layout */
#cards {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.card {
  background: white;
  border-radius: 10px;
  padding: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.row {
  display: flex;
  justify-content: space-between;
  margin: 4px 0;
  font-size: 14px;
}

.label {
  color: #666;
}

.value {
  font-weight: bold;
}

.status {
  padding: 4px 8px;
  border-radius: 6px;
  font-size: 12px;
}

.pending {
  background: #ffc107;
}

.completed {
  background: #28a745;
  color: white;
}

button.complete-btn {
  width: 100%;
  margin-top: 8px;
  padding: 10px;
  border: none;
  border-radius: 6px;
  background: #28a745;
  color: white;
  font-size: 14px;
}
</style>
</head>

<body>

<h1>Airport Pickup Dispatch</h1>

<button id="installBtn">📲 Install App</button>

<div id="cards"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* Firebase config */
const firebaseConfig = {
  apiKey: "AIzaSyCCehxMag_g2wXh7WzruvZyt9kdSJI4OpI",
  authDomain: "crew-app-e1315.firebaseapp.com",
  databaseURL: "https://crew-app-e1315-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "crew-app-e1315"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const pickupsRef = ref(db, "pickups1");

const container = document.getElementById("cards");

const SHEETS_URL = "https://script.google.com/macros/s/AKfycbwst8TZc5AwsLHg1GFhIqT_ca-CcfG-SBB4kRuBTRJ32jLCDWTVYgu4WCb7_srBQcUiUQ/exec";

let pickupsData = {};

/* Load data */
onValue(pickupsRef, snapshot => {
  pickupsData = snapshot.val() || {};
  renderCards();
});

/* Render cards */
function renderCards(){
  container.innerHTML = "";

  const keys = Object.keys(pickupsData).reverse();

  keys.forEach(key => {
    const p = pickupsData[key];

    const startTime = p.pickupTime ? new Date(p.pickupTime) : null;
    const completedTime = p.completedTime ? new Date(p.completedTime) : null;

    const duration = (startTime && completedTime) 
      ? Math.floor((completedTime - startTime)/60000) 
      : 0;

    const startDate = startTime ? startTime.toISOString().split("T")[0] : "";
    const startClock = startTime ? startTime.toISOString().split("T")[1].substring(0,5) : "";
    const completedClock = completedTime ? completedTime.toISOString().split("T")[1].substring(0,5) : "";

    const statusClass = p.status === "Completed" ? "completed" : "pending";

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="row"><span class="label">Flight</span><span class="value">${p.flightNumber||""}</span></div>
      <div class="row"><span class="label">Type</span><span>${p.type||""}</span></div>
      <div class="row"><span class="label">Stand</span><span>${p.stand||""}</span></div>
      <div class="row"><span class="label">Start</span><span>${startDate} ${startClock}</span></div>
      <div class="row"><span class="label">Completed</span><span>${completedClock||"-"}</span></div>
      <div class="row"><span class="label">Crew</span><span>${p.crew||""}</span></div>
      <div class="row"><span class="label">Duration</span><span>${duration} min</span></div>
      <div class="row">
        <span class="label">Status</span>
        <span class="status ${statusClass}">${p.status||""}</span>
      </div>
      ${p.status==="Pending" ? `<button class="complete-btn" onclick="completePickup('${key}')">Mark Complete</button>` : ""}
    `;

    container.appendChild(card);

    /* Send to Google Sheets */
    fetch(SHEETS_URL, {
      method: "POST",
      body: JSON.stringify({
        id: key,
        flightNumber: p.flightNumber,
        type: p.type,
        stand: p.stand,
        startDate,
        startTime: startClock,
        completedTime: completedClock,
        crew: p.crew,
        status: p.status,
        duration
      })
    }).catch(console.warn);
  });
}

/* Complete button */
window.completePickup = async function(id){
  const now = new Date().toISOString();
  const start = pickupsData[id].pickupTime;

  const duration = start 
    ? Math.floor((new Date(now) - new Date(start)) / 60000) 
    : 0;

  await update(ref(db,"pickups1/"+id), {
    status: "Completed",
    completedTime: now,
    duration
  });
};

/* INSTALL BUTTON */
let deferredPrompt;
const installBtn = document.getElementById('installBtn');

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  installBtn.style.display = 'block';
});

installBtn.addEventListener('click', async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
    installBtn.style.display = 'none';
  }
});

/* SERVICE WORKER */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./service-worker.js');
}
</script>

</body>
</html>
