<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>ABM Crew Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#007bff">

<!-- PWA -->
<link rel="manifest" href="manifest.json">

<style>
body {
  font-family: Arial;
  margin:0;
  background:#f0f3f7;
  max-width:700px;
  margin:auto;
}

/* HEADER */
header {
  background:#007bff;
  color:white;
  padding:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

#logoutBtn {
  background:red;
  border:none;
  color:white;
  padding:6px 10px;
  border-radius:6px;
}

/* TABS */
.tabs { display:flex; background:#e9ecef; }
.tab { flex:1; padding:12px; text-align:center; font-weight:bold; }
.tab.active { background:white; color:#007bff; border-bottom:3px solid #007bff; }

/* CARD */
.card {
  background:white;
  margin:10px auto;
  padding:14px;
  border-radius:12px;
  width:95%;
  max-width:600px;
  position:relative;
}

/* ALERT STATE */
.alert {
  border-left:6px solid red;
  animation: pulse 1s infinite;
}

@keyframes pulse {
  0% { box-shadow:0 0 0 0 rgba(255,0,0,0.5); }
  70% { box-shadow:0 0 0 10px rgba(255,0,0,0); }
  100% { box-shadow:0 0 0 0 rgba(255,0,0,0); }
}

/* BADGES */
.status-badge {
  padding:4px 10px;
  border-radius:12px;
  color:white;
  font-size:12px;
}
.status-pending { background:#FF6B6B; }
.status-completed { background:#4CAF50; }

.duration-badge {
  position:absolute;
  top:10px;
  right:10px;
  background:#ff9800;
  color:white;
  padding:4px 8px;
  border-radius:8px;
  font-size:12px;
}

/* BUTTON */
button {
  width:100%;
  margin-top:10px;
  padding:12px;
  font-size:16px;
  background:#007bff;
  color:white;
  border:none;
  border-radius:8px;
}
</style>
</head>

<body>

<div id="app">
<header>
  <div>Pickup Dashboard</div>
  <button id="logoutBtn">Logout</button>
</header>

<div class="tabs">
  <div class="tab active" id="tabLive">Live</div>
  <div class="tab" id="tabCompleted">Completed</div>
</div>

<div id="cards"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* CONFIG */
const ALERT_MINUTES = 5;

const firebaseConfig = { /* your config */ };

const appFirebase = initializeApp(firebaseConfig);
const db = getDatabase(appFirebase);
const pickupsRef = ref(db, "pickups1");

const cards = document.getElementById("cards");
const tabLive = document.getElementById("tabLive");
const tabCompleted = document.getElementById("tabCompleted");

let pickupsData = {};
let currentTab = "live";
let alerted = {};

/* TIME */
function formatDuration(ms){
  const m = Math.floor(ms/60000);
  const s = Math.floor((ms/1000)%60);
  return `${m}:${s.toString().padStart(2,"0")}`;
}

/* SORT (longest waiting first) */
function sortPickups(list){
  return list.sort((a,b)=>b.duration-a.duration);
}

/* RENDER */
function render(){
  cards.innerHTML="";

  let list = [];

  Object.entries(pickupsData).forEach(([id,p])=>{
    const status=p.status||"Pending";
    if(currentTab==="live" && status!=="Pending") return;
    if(currentTab==="completed" && status!=="Completed") return;

    const pickupTime=new Date(p.pickupTime||Date.now());
    const completedTime=p.completedTime?new Date(p.completedTime):null;
    const duration=status==="Pending"
      ? Date.now()-pickupTime
      : completedTime ? completedTime-pickupTime : 0;

    list.push({id,p,duration});
  });

  list = sortPickups(list);

  list.forEach(({id,p,duration})=>{
    const mins = duration/60000;

    const card=document.createElement("div");
    card.className="card";

    /* ALERT TRIGGER */
    if(mins > ALERT_MINUTES){
      card.classList.add("alert");

      if(!alerted[id]){
        alerted[id]=true;
        navigator.vibrate?.([200,100,200]);
      }
    }

    card.innerHTML=`
      <div style="display:flex; justify-content:space-between;">
        <b>${p.flightNumber||"N/A"}</b>
        <span class="status-badge ${p.status==="Completed"?"status-completed":"status-pending"}">${p.status||"Pending"}</span>
      </div>

      <div style="margin-top:8px;">
        ${p.type||""} • Stand ${p.stand||""}
      </div>

      <div style="margin-top:6px; font-size:14px; color:#555;">
        Crew: ${p.crew||""}
      </div>

      ${p.status!=="Completed" ? `<button onclick="complete('${id}')">Complete</button>` : ""}

      <span class="duration-badge">${formatDuration(duration)}</span>
    `;

    cards.appendChild(card);
  });
}

/* COMPLETE */
window.complete=function(id){
  const now=new Date();
  const p=pickupsData[id];

  update(ref(db,"pickups1/"+id),{
    ...p,
    status:"Completed",
    completedTime:now.toISOString()
  });
};

/* LIVE TIMER */
setInterval(render,1000);

/* FIREBASE */
onValue(pickupsRef,snap=>{
  pickupsData=snap.val()||{};
  render();
});
</script>

</body>
</html>
