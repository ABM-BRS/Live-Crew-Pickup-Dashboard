<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
.card { margin-bottom: 15px; }
.badge { font-size: 0.9em; }
.badge-green { background-color: #28a745; }
.badge-yellow { background-color: #ffc107; color: #000; }
.badge-red { background-color: #dc3545; }
.time-badge { display: block; font-size: 1.2em; }
.status-badge { margin-top: 5px; display: block; font-size: 0.9em; }
</style>
</head>
<body>
<div class="container">
  <div class="row my-3">
    <div class="col-md-6">
      <div class="card p-3">
        <h5>Requested → Collected</h5>
        <span id="badge-requested-collected" class="badge time-badge">--</span>
        <span id="status-requested-collected" class="badge status-badge">--</span>
      </div>
    </div>
    <div class="col-md-6">
      <div class="card p-3">
        <h5>Collected → Completed</h5>
        <span id="badge-collected-completed" class="badge time-badge">--</span>
        <span id="status-collected-completed" class="badge status-badge">--</span>
      </div>
    </div>
  </div>

  <div class="row my-3">
    <div class="col-md-6">
      <canvas id="donutChart"></canvas>
    </div>
    <div class="col-md-6">
      <canvas id="sparklineChart"></canvas>
    </div>
  </div>
</div>

<script>
// Configuration
const KPI_REQUESTED_TO_COLLECTED = 7; // mins
const KPI_COLLECTED_TO_COMPLETED = 10; // mins
const GOOGLE_SHEET_URL = 'https://script.google.com/macros/s/AKfycbxrOgennNs_oXXCTHiM2GNEsR2vmyXF9o9-4g8sxPKKaNHyOjEC5cRFf01k97GoAYBl/exec';

// Fetch data from Google Sheets
async function fetchData() {
  try {
    const res = await fetch(GOOGLE_SHEET_URL);
    const data = await res.json();
    return data;
  } catch (e) {
    console.error('Error fetching data:', e);
    return [];
  }
}

// Utility: calculate duration in minutes
function getDuration(start, end) {
  if (!start || !end) return null;
  const startTime = new Date(start);
  const endTime = new Date(end);
  const diffMinutes = Math.floor((endTime - startTime) / 60000);
  return { minutes: diffMinutes };
}

// Determine badge color
function getBadgeColor(type, duration) {
  if (!duration) return 'badge-yellow';
  
  let threshold, warningThreshold;
  if (type === 'requested-collected') {
    threshold = KPI_REQUESTED_TO_COLLECTED;
  } else if (type === 'collected-completed') {
    threshold = KPI_COLLECTED_TO_COMPLETED;
  } else {
    return 'badge-yellow';
  }

  warningThreshold = Math.floor(threshold * 0.8); // 80% of KPI

  if (duration.minutes >= threshold) {
    return 'badge-red'; // exceeded KPI
  } else if (duration.minutes >= warningThreshold) {
    return 'badge-yellow'; // approaching KPI
  } else {
    return 'badge-green'; // within KPI
  }
}

// Update badges
function updateBadges(data) {
  if (!data.length) return;

  let totalRequestedCollected = 0, totalCollectedCompleted = 0;
  let countRC = 0, countCC = 0;

  data.forEach(row => {
    const reqTime = row.requestedTime;
    const colTime = row.collectedTime;
    const compTime = row.completedTime;

    if (reqTime && colTime) {
      const durationRC = getDuration(reqTime, colTime);
      totalRequestedCollected += durationRC.minutes;
      countRC++;
      const badgeRC = document.getElementById('badge-requested-collected');
      const statusRC = document.getElementById('status-requested-collected');
      badgeRC.textContent = durationRC.minutes + ' min';
      badgeRC.className = 'badge time-badge ' + getBadgeColor('requested-collected', durationRC);
      statusRC.textContent = row.status || '--';
    }

    if (colTime && compTime) {
      const durationCC = getDuration(colTime, compTime);
      totalCollectedCompleted += durationCC.minutes;
      countCC++;
      const badgeCC = document.getElementById('badge-collected-completed');
      const statusCC = document.getElementById('status-collected-completed');
      badgeCC.textContent = durationCC.minutes + ' min';
      badgeCC.className = 'badge time-badge ' + getBadgeColor('collected-completed', durationCC);
      statusCC.textContent = row.status || '--';
    }
  });
}

// Render charts
function renderCharts(data) {
  const donutCtx = document.getElementById('donutChart').getContext('2d');
  const sparkCtx = document.getElementById('sparklineChart').getContext('2d');

  const donutData = data.reduce((acc, row) => {
    const status = row.status || 'Unknown';
    acc[status] = (acc[status] || 0) + 1;
    return acc;
  }, {});

  new Chart(donutCtx, {
    type: 'doughnut',
    data: {
      labels: Object.keys(donutData),
      datasets: [{ data: Object.values(donutData), backgroundColor: ['#28a745','#ffc107','#dc3545','#007bff'] }]
    },
    options: { responsive: true }
  });

  const sparkData = data.map(r => {
    const colTime = r.collectedTime;
    const compTime = r.completedTime;
    if (colTime && compTime) return getDuration(colTime, compTime).minutes;
    return 0;
  });

  new Chart(sparkCtx, {
    type: 'line',
    data: { labels: sparkData.map((_, i) => i+1), datasets: [{ data: sparkData, borderColor: '#007bff', fill: false }] },
    options: { responsive: true, plugins: { legend: { display: false } } }
  });
}

// Main refresh
async function refreshDashboard() {
  const data = await fetchData();
  updateBadges(data);
  renderCharts(data);
}

refreshDashboard();
setInterval(refreshDashboard, 60000); // refresh every 1 min
</script>
</body>
</html>
