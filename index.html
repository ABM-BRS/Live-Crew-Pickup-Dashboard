<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>ABM Crew Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; margin:0; background:#f0f3f7; max-width:900px; margin:auto; }

header { background:#007bff; color:white; padding:12px; display:flex; justify-content:space-between; }
button { padding:10px; border:none; border-radius:6px; cursor:pointer; }

.tabs { display:flex; }
.tab { flex:1; padding:10px; text-align:center; background:#ddd; cursor:pointer; }
.tab.active { background:white; font-weight:bold; }

#cards { padding:10px; }

.card { background:white; padding:10px; margin-bottom:10px; border-radius:10px; }

#kpiInfo { display:none; background:white; padding:10px; margin:10px; border-radius:10px; }
#kpiInfo.show { display:block; }

#collectedBar,#completedBar { height:6px; background:green; width:0%; transition:width 0.5s; }

canvas { max-height:200px; }
</style>
</head>

<body>

<header>
  <div>Dashboard</div>
  <button id="logoutBtn">Logout</button>
</header>

<button id="installBtn">Install</button>
<button id="compactBtn">Toggle Compact</button>

<div class="tabs">
  <div class="tab active" id="tabLive">Live</div>
  <div class="tab" id="tabCompleted">Completed</div>
</div>

<div>
  Total: <span id="totalJobs">0</span> |
  Pending: <span id="pendingJobs">0</span> |
  Completed: <span id="completedJobs">0</span>
  <button id="kpiBtn">KPI</button>
  Success: <span id="successPct">0</span>%
</div>

<div id="kpiInfo">
  Collected
  <div id="collectedBar"></div>
  Completed
  <div id="completedBar"></div>
  <div>
    <span id="collectedPct">0%</span> |
    <span id="completedPct">0%</span>
  </div>
</div>

<canvas id="pickupChart"></canvas>
<canvas id="sparklineChart"></canvas>

<div id="cards"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* SAFE GET */
const el = id => document.getElementById(id) || {};

/* FIREBASE */
const app = initializeApp({
  apiKey: "AIzaSy...",
  databaseURL: "https://crew-app-e1315-default-rtdb.europe-west1.firebasedatabase.app"
});
const db = getDatabase(app);
const pickupsRef = ref(db,"pickups1");

let data = {};
let currentTab="live";

/* CHARTS SAFE INIT */
let pickupChart, sparkChart;

try {
  pickupChart = new Chart(el("pickupChart"),{
    type:'doughnut',
    data:{labels:['Pending','Done'],datasets:[{data:[0,0]}]}
  });

  sparkChart = new Chart(el("sparklineChart"),{
    type:'line',
    data:{
      labels:Array.from({length:24},(_,i)=>i),
      datasets:[{data:Array(24).fill(0)}]
    }
  });
} catch(e){ console.warn("Chart init failed", e); }

/* SAFE COUNT ANIMATION */
function setText(id,val){
  const e=el(id);
  if(e) e.textContent=val;
}

/* RENDER SAFE */
function render(){
  try{
    let total=0,pending=0,completed=0,success=0;

    Object.values(data||{}).forEach(p=>{
      total++;
      const s=p?.status||"Pending";
      if(s==="Pending") pending++;
      if(s==="Completed"){
        completed++;
        if(p?.collectedWithinKPI && p?.completedWithinKPI) success++;
      }
    });

    setText("totalJobs",total);
    setText("pendingJobs",pending);
    setText("completedJobs",completed);
    setText("successPct", total?Math.round(success/total*100):0);

    /* KPI bars */
    const collectedPct = total?Math.round(success/total*100):0;
    const completedPct = completed?Math.round(success/completed*100):0;

    el("collectedBar").style.width = collectedPct+"%";
    el("completedBar").style.width = completedPct+"%";

    setText("collectedPct",collectedPct+"%");
    setText("completedPct",completedPct+"%");

    /* CARDS */
    const cards=el("cards");
    cards.innerHTML="";

    Object.entries(data||{}).forEach(([id,p])=>{
      const s=p?.status||"Pending";
      if(currentTab==="live" && s!=="Pending") return;
      if(currentTab==="completed" && s!=="Completed") return;

      const div=document.createElement("div");
      div.className="card";
      div.innerHTML=`
        <b>${p.flightNumber||"N/A"}</b><br>
        ${s}<br>
        <button onclick="complete('${id}')">Complete</button>
      `;
      cards.appendChild(div);
    });

    /* CHART UPDATE SAFE */
    if(pickupChart){
      pickupChart.data.datasets[0].data=[pending,completed];
      pickupChart.update();
    }

  }catch(e){
    console.error("Render error:",e);
  }
}

/* COMPLETE SAFE */
window.complete=function(id){
  try{
    const p=data[id]||{};
    update(ref(db,"pickups1/"+id),{
      ...p,
      status:"Completed",
      completedTime:new Date().toISOString()
    });
  }catch(e){
    console.error("Complete failed",e);
  }
}

/* EVENTS SAFE */
el("tabLive").onclick=()=>{currentTab="live"; render();}
el("tabCompleted").onclick=()=>{currentTab="completed"; render();}
el("kpiBtn").onclick=()=>el("kpiInfo").classList.toggle("show");
el("logoutBtn").onclick=()=>location.reload();

/* FIREBASE LISTENER SAFE */
onValue(pickupsRef,snap=>{
  try{
    data=snap.val()||{};
    render();
  }catch(e){
    console.error("Firebase error",e);
  }
});
</script>

</body>
</html>
