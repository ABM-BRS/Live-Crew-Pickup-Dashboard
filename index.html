<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>ABM Crew Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#007bff">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  margin:0;
  background:#f0f3f7;
  max-width:900px;
  margin:auto;
}

header {
  background:#007bff;
  color:white;
  padding:12px;
  display:flex;
  justify-content:space-between;
}

.tabs { display:flex; }
.tab { flex:1; padding:12px; text-align:center; cursor:pointer; }
.tab.active { background:white; color:#007bff; }

#cards { padding:10px; }
.card {
  background:white;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.status-badge { padding:4px 8px; border-radius:10px; color:white; font-size:12px; }
.status-pending { background:red; }
.status-completed { background:green; }

#kpiInfo {
  max-height:0;
  overflow:hidden;
  opacity:0;
  transition:0.4s;
}
#kpiInfo.show {
  max-height:200px;
  opacity:1;
}

#collectedBar,#completedBar {
  height:6px;
  transition:width 0.5s;
}
</style>
</head>

<body>

<header>
  <div>Pickup Dashboard</div>
  <button id="logoutBtn">Logout</button>
</header>

<div class="tabs">
  <div class="tab active" id="tabLive">Live</div>
  <div class="tab" id="tabCompleted">Completed</div>
</div>

<div style="padding:10px;">
  Total: <span id="totalJobs">0</span> |
  Pending: <span id="pendingJobs">0</span> |
  Completed: <span id="completedJobs">0</span>
  <button id="kpiBtn">Collection KPI's</button>
  Success KPI: <span id="successPct">0</span>%
</div>

<div id="kpiInfo">
  <div>Collected KPI</div>
  <div id="collectedBar" style="background:#28a745;width:0%"></div>

  <div style="margin-top:8px;">Completed KPI</div>
  <div id="completedBar" style="background:#ffc107;width:0%"></div>

  <div style="margin-top:6px;">
    <span id="collectedPct">0%</span> |
    <span id="completedPct">0%</span>
  </div>
</div>

<canvas id="pickupChart"></canvas>
<canvas id="sparklineChart"></canvas>

<div id="cards"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  databaseURL: "https://crew-app-e1315-default-rtdb.europe-west1.firebasedatabase.app"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const pickupsRef = ref(db, "pickups1");

let pickupsData = {};
let currentTab = "live";

/* TABS */
tabLive.onclick=()=>{currentTab="live";render();}
tabCompleted.onclick=()=>{currentTab="completed";render();}

/* KPI CALC FUNCTION */
function getKPI(p){
  if(!p.pickupTime || !p.completedTime) return {collected:false,completed:false};

  const mins = (new Date(p.completedTime) - new Date(p.pickupTime)) / 60000;

  return {
    collected: mins <= 7,
    completed: mins <= 10
  };
}

/* RENDER */
function render(){
  let total=0,pending=0,completed=0,success=0;
  let collectedOKCount=0, completedOKCount=0;

  cards.innerHTML="";

  Object.entries(pickupsData).forEach(([id,p])=>{
    const status=p.status||"Pending";

    // GLOBAL COUNTS
    total++;
    if(status==="Pending") pending++;
    if(status==="Completed"){
      completed++;

      const kpi=getKPI(p);

      if(kpi.collected) collectedOKCount++;
      if(kpi.completed) completedOKCount++;

      if(kpi.collected && kpi.completed) success++;
    }

    // FILTER FOR DISPLAY
    if(currentTab==="live" && status!=="Pending") return;
    if(currentTab==="completed" && status!=="Completed") return;

    const div=document.createElement("div");
    div.className="card";

    let badge="";
    if(status==="Completed"){
      const kpi=getKPI(p);
      badge = `<span class="status-badge" style="background:${(kpi.collected&&kpi.completed)?'#28a745':'#ffc107'}">
        ${(kpi.collected&&kpi.completed)?"✓ KPI":"X KPI"}
      </span>`;
    }

    div.innerHTML=`
      <b>${p.flightNumber||"N/A"}</b>
      <span class="status-badge ${status==="Completed"?"status-completed":"status-pending"}">${status}</span>
      ${badge}
      <br>
      ${p.type||""}
      <br>
      ${status!=="Completed"?`<button onclick="complete('${id}')">Complete</button>`:""}
    `;

    cards.appendChild(div);
  });

  // KPI DISPLAY
  totalJobs.textContent=total;
  pendingJobs.textContent=pending;
  completedJobs.textContent=completed;
  successPct.textContent=total?Math.round(success/total*100):0;

  const collectedPct = total?Math.round(collectedOKCount/total*100):0;
  const completedPct = completed?Math.round(completedOKCount/completed*100):0;

  collectedBar.style.width=collectedPct+"%";
  completedBar.style.width=completedPct+"%";

  collectedPctEl = document.getElementById("collectedPct");
  completedPctEl = document.getElementById("completedPct");

  collectedPctEl.textContent=collectedPct+"%";
  completedPctEl.textContent=completedPct+"%";

  // CHART
  pickupChart.data.datasets[0].data=[pending,success,completed-success];
  pickupChart.update();
}

/* COMPLETE */
window.complete=function(id){
  const p=pickupsData[id];
  update(ref(db,"pickups1/"+id),{
    ...p,
    status:"Completed",
    completedTime:new Date().toISOString()
  });
}

/* CHARTS */
const pickupChart=new Chart(document.getElementById("pickupChart"),{
  type:'doughnut',
  data:{
    labels:['Pending','KPI','Non-KPI'],
    datasets:[{data:[0,0,0],backgroundColor:['#FF6B6B','#28a745','#ffc107']}]
  }
});

/* KPI TOGGLE */
kpiBtn.onclick=()=>kpiInfo.classList.toggle("show");

/* FIREBASE */
onValue(pickupsRef,snap=>{
  pickupsData=snap.val()||{};
  render();
});
</script>

</body>
</html>
