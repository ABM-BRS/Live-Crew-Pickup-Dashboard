<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Airport Pickup Dispatch</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#007bff">
<link rel="apple-touch-icon" href="favicon-192.png">

<style>
body { 
  font-family: Arial; 
  background: #f4f6f8; 
  margin: 0;
}

header {
  background: #007bff;
  color: white;
  padding: 12px;
  text-align: center;
  font-size: 18px;
}

/* Tabs */
.tabs {
  display: flex;
}

.tab {
  flex: 1;
  padding: 12px;
  text-align: center;
  background: #ddd;
}

.tab.active {
  background: white;
  font-weight: bold;
}

/* Install button */
#installBtn {
  display: none;
  width: 95%;
  margin: 10px auto;
  padding: 10px;
  background: #007bff;
  color: white;
  border: none;
  border-radius: 8px;
}

/* Cards */
#cards {
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.card {
  background: white;
  border-radius: 10px;
  padding: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  animation: fadeIn 0.3s ease;
}

.new {
  border-left: 5px solid #007bff;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(5px); }
  to { opacity: 1; transform: translateY(0); }
}

.row {
  display: flex;
  justify-content: space-between;
  font-size: 14px;
}

.status {
  padding: 4px 8px;
  border-radius: 6px;
  font-size: 12px;
}

.pending { background: #ffc107; }
.completed { background: #28a745; color: white; }

button.complete-btn {
  width: 100%;
  margin-top: 8px;
  padding: 10px;
  border: none;
  border-radius: 6px;
  background: #28a745;
  color: white;
}
</style>
</head>

<body>

<header>Airport Pickup Dispatch</header>

<button id="installBtn">📲 Install App</button>

<div class="tabs">
  <div class="tab active" onclick="switchTab('live')">Live</div>
  <div class="tab" onclick="switchTab('completed')">Completed</div>
</div>

<div id="cards"></div>

<!-- 🔊 Optional sound -->
<audio id="ping" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "crew-app-e1315.firebaseapp.com",
  databaseURL: "https://crew-app-e1315-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "crew-app-e1315"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const pickupsRef = ref(db, "pickups1");

const container = document.getElementById("cards");
const ping = document.getElementById("ping");

let pickupsData = {};
let currentTab = "live";
let previousKeys = [];

onValue(pickupsRef, snapshot => {
  const newData = snapshot.val() || {};

  // 🔊 Detect new pickups
  const newKeys = Object.keys(newData);
  if (previousKeys.length && newKeys.length > previousKeys.length) {
    ping.play().catch(()=>{});
  }

  previousKeys = newKeys;
  pickupsData = newData;

  render();
});

function switchTab(tab){
  currentTab = tab;

  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  event.target.classList.add("active");

  render();
}

function render(){
  container.innerHTML = "";

  const entries = Object.entries(pickupsData).reverse();

  entries.forEach(([key, p]) => {

    if(currentTab === "live" && p.status !== "Pending") return;
    if(currentTab === "completed" && p.status !== "Completed") return;

    const start = p.pickupTime ? new Date(p.pickupTime) : null;
    const end = p.completedTime ? new Date(p.completedTime) : null;

    const duration = (start && end) ? Math.floor((end-start)/60000) : 0;

    const card = document.createElement("div");
    card.className = "card";

    if (!previousKeys.includes(key)) {
      card.classList.add("new");
    }

    card.innerHTML = `
      <div class="row"><b>${p.flightNumber||""}</b><span>${p.type||""}</span></div>
      <div class="row"><span>Stand</span><span>${p.stand||""}</span></div>
      <div class="row"><span>Crew</span><span>${p.crew||""}</span></div>
      <div class="row"><span>Start</span><span>${start ? start.toLocaleTimeString() : ""}</span></div>
      <div class="row"><span>Duration</span><span>${duration} min</span></div>
      <div class="row">
        <span class="status ${p.status==="Completed"?"completed":"pending"}">${p.status}</span>
      </div>
      ${p.status==="Pending" ? `<button class="complete-btn" onclick="completePickup('${key}')">Complete</button>` : ""}
    `;

    container.appendChild(card);
  });
}

window.completePickup = async function(id){
  const now = new Date().toISOString();
  const start = pickupsData[id].pickupTime;

  const duration = start 
    ? Math.floor((new Date(now)-new Date(start))/60000)
    : 0;

  await update(ref(db,"pickups1/"+id), {
    status: "Completed",
    completedTime: now,
    duration
  });
};

/* Install */
let deferredPrompt;
const installBtn = document.getElementById('installBtn');

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  installBtn.style.display = 'block';
});

installBtn.onclick = async () => {
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
};

/* Service worker */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./service-worker.js');
}
</script>

</body>
</html>
