<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ABM Pickup App</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#007bff">

<style>
body { font-family: Arial; margin: 0; background: #f4f6f8; }

/* Login */
#login {
  padding: 20px;
}

input {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  background: #007bff;
  color: white;
  border: none;
  border-radius: 6px;
}

/* App */
#app { display: none; }

header {
  background: #007bff;
  color: white;
  padding: 12px;
  text-align: center;
}

/* Tabs */
.tabs {
  display: flex;
}

.tab {
  flex: 1;
  padding: 10px;
  text-align: center;
  background: #ddd;
}

.tab.active {
  background: white;
  font-weight: bold;
}

/* Cards */
#cards {
  padding: 10px;
}

.card {
  background: white;
  margin-bottom: 10px;
  padding: 10px;
  border-radius: 8px;
}

.status {
  padding: 4px 8px;
  border-radius: 6px;
}

.pending { background: #ffc107; }
.completed { background: #28a745; color: white; }

/* Install button */
#installBtn {
  display: none;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>ABM Login</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <div id="loginMsg"></div>
</div>

<!-- APP -->
<div id="app">
  <header>Pickup Dashboard</header>

  <button id="installBtn">📲 Install App</button>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('live', this)">Live</div>
    <div class="tab" onclick="switchTab('completed', this)">Completed</div>
  </div>

  <div id="cards"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* Firebase */
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "crew-app-e1315.firebaseapp.com",
  databaseURL: "https://crew-app-e1315-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "crew-app-e1315"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

const cards = document.getElementById("cards");
const loginMsg = document.getElementById("loginMsg");

let role = "crew";
let currentTab = "live";

/* LOGIN */
window.login = async function(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    await signInWithEmailAndPassword(auth, email, password);
  } catch (err) {
    loginMsg.innerHTML = "<p style='color:red;'>Login failed</p>";
  }
};

/* AUTH CHECK */
onAuthStateChanged(auth, user => {
  if(user){
    const email = user.email || "";

    // 🔐 Domain restriction
    if(!email.endsWith("@abm.com")){
      loginMsg.innerHTML = "<p style='color:red;'>Use your @abm.com email</p>";
      signOut(auth);
      return;
    }

    // ✅ Show app
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";

    // 👤 Role logic
    const admins = ["manager@abm.com", "supervisor@abm.com"];
    role = admins.includes(email) ? "admin" : "crew";

    loadData();
  }
});

/* LOAD DATA */
function loadData(){
  const pickupsRef = ref(db, "pickups1");

  onValue(pickupsRef, snapshot => {
    const data = snapshot.val() || {};
    render(data);
  });
}

/* TABS */
window.switchTab = function(tab, el){
  currentTab = tab;
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
  loadData();
};

/* RENDER */
function render(data){
  cards.innerHTML = "";

  Object.entries(data).reverse().forEach(([key, p]) => {

    if(currentTab === "live" && p.status !== "Pending") return;
    if(currentTab === "completed" && p.status !== "Completed") return;

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <b>${p.flightNumber || ""}</b><br>
      ${p.type || ""} - Stand ${p.stand || ""}<br>
      Crew: ${p.crew || ""}<br>
      Status: <span class="${p.status==="Completed"?"completed":"pending"}">${p.status}</span>
      ${role==="admin" && p.status==="Pending"
        ? `<button onclick="completePickup('${key}')">Complete</button>`
        : ""
      }
    `;

    cards.appendChild(card);
  });
}

/* COMPLETE */
window.completePickup = async function(id){
  await update(ref(db,"pickups1/"+id), {
    status: "Completed",
    completedTime: new Date().toISOString()
  });
};

/* INSTALL BUTTON */
let deferredPrompt;
const installBtn = document.getElementById('installBtn');

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  installBtn.style.display = 'block';
});

installBtn.onclick = async () => {
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
};

/* SERVICE WORKER */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./service-worker.js');
}
</script>

</body>
</html>
