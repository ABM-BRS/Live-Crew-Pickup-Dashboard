<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, update, push } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyCCehxMag_g2wXh7WzruvZyt9kdSJI4OpI",
  authDomain: "crew-app-e1315.firebaseapp.com",
  databaseURL: "https://crew-app-e1315-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "crew-app-e1315",
  storageBucket: "crew-app-e1315.firebasestorage.app",
  messagingSenderId: "320647227664",
  appId: "1:320647227664:web:8de65c96c509d819a7dd95"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const pickupsRef = ref(db, "pickups1");

const tbody = document.getElementById("dashboard-body");

// Your Google Apps Script Web App URL
const SHEETS_URL = "https://script.google.com/macros/s/YOUR_DEPLOYED_WEBAPP_ID/exec"; 

let flashState = false;
setInterval(() => { flashState = !flashState; updateFlash(); }, 1000);

let pickupsData = {};

onValue(pickupsRef, snapshot => {
  pickupsData = snapshot.val() || {};
  renderTable();
});

function renderTable() {
  tbody.innerHTML = "";
  const now = new Date();
  for (const key in pickupsData) {
    const p = pickupsData[key];
    const startTime = p.pickupTime ? new Date(p.pickupTime) : null;
    const completedTime = p.completedTime ? new Date(p.completedTime) : null;
    const duration = (startTime && completedTime) ? Math.floor((completedTime - startTime)/60000) : "";

    const tr = document.createElement("tr");
    tr.dataset.key = key;

    const actionBtn = (p.status === "Pending") 
      ? `<button class="complete-btn" onclick="completePickup('${key}')">Complete</button>` 
      : "-";

    tr.innerHTML = `
      <td>${p.flightNumber || ""}</td>
      <td>${p.type || ""}</td>
      <td>${p.stand || ""}</td>
      <td>${startTime ? startTime.toLocaleString() : ""}</td>
      <td>${completedTime ? completedTime.toLocaleString() : ""}</td>
      <td>${p.crew || ""}</td>
      <td>${p.status || ""}</td>
      <td>${duration}</td>
      <td>${actionBtn}</td>
    `;
    tbody.appendChild(tr);
  }
  updateFlash();
}

// Complete pickup
window.completePickup = async function(id) {
  const pickupRef = ref(db, "pickups1/" + id);
  const now = new Date().toISOString();
  const p = pickupsData[id];
  const startTime = p.pickupTime;
  const duration = startTime ? Math.floor((new Date(now) - new Date(startTime))/60000) : "";

  // Update Firebase
  await update(pickupRef, {
    status: "Completed",
    completedTime: now,
    durationMinutes: duration
  });

  // Send update to Google Sheets
  try {
    await fetch(SHEETS_URL, {
      method: "POST",
      body: JSON.stringify({
        id: id,
        flightNumber: p.flightNumber,
        type: p.type,
        stand: p.stand,
        pickupTime: startTime,
        completedTime: now,
        crew: p.crew,
        status: "Completed",
        duration: duration
      })
    });
  } catch(e) {
    console.warn("Failed to send to Google Sheets:", e);
  }
}

// Flashing and overdue logic
function updateFlash() {
  const now = new Date();
  Array.from(tbody.rows).forEach(tr => {
    const key = tr.dataset.key;
    const p = pickupsData[key];
    const startTime = p.pickupTime ? new Date(p.pickupTime) : null;
    const status = p.status;

    tr.className = "";
    tr.style.background = "";

    if(status === "Pending") {
      if(startTime && startTime < now){
        tr.classList.add("pending-overdue"); // red
      } else if(startTime && startTime - now <= 5*60*1000){
        tr.style.background = flashState ? "#fff3cd" : "#fff7e6"; // flashing yellow
      }
    }
  });
}
</script>
