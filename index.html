<<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>ABM Crew Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#007bff">

<!-- iOS PWA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ABM Crew Dashboard">
<link rel="apple-touch-icon" href="/icons/icon-192.png">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Manifest -->
<link rel="manifest" href="/Live-Crew-Pickup-Dashboard/manifest.json">

<style>
body {
  font-family: Arial;
  margin:0;
  background:#f0f3f7;
  max-width:900px;
  margin:auto;
}

/* HEADER */
header {
  background:#007bff;
  color:white;
  padding:12px;
  display:flex;
  justify-content:space-between;
}

/* BUTTONS */
button {
  width:100%;
  margin-top:10px;
  padding:10px;
  background:#007bff;
  color:white;
  border:none;
  border-radius:8px;
}

/* INSTALL */
#installBtn { background:#28a745; margin:10px auto; display:block; }
#iosHint,#desktopHint { display:none; text-align:center; font-size:13px; }

/* COMPACT */
#compactToggle {
  display:block;
  margin:10px auto;
  background:#6c757d;
}

/* TABS */
.tabs { display:flex; background:#e9ecef; }
.tab { flex:1; padding:10px; text-align:center; cursor:pointer; }
.tab.active { background:white; color:#007bff; border-bottom:3px solid #007bff; }

/* CHARTS */
.chart-container {
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin:10px;
}
.chart-card {
  flex:1 1 45%;
  background:white;
  padding:10px;
  border-radius:10px;
}

/* CARDS */
#cards {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(260px,1fr));
  gap:10px;
  margin:10px;
}

.card {
  background:white;
  padding:10px;
  border-radius:10px;
}

body.compact #cards {
  grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
}

body.compact .card {
  font-size:12px;
  padding:8px;
}

/* STATUS */
.status-badge {
  padding:4px 8px;
  border-radius:10px;
  color:white;
  font-size:12px;
}
.status-pending { background:#FF6B6B; }
.status-completed { background:#4CAF50; }
</style>
</head>

<body>

<header>
  <div>Pickup Dashboard</div>
  <button id="logoutBtn">Logout</button>
</header>

<button id="installBtn">Install App</button>
<div id="iosHint">Tap Share → Add to Home Screen</div>
<div id="desktopHint">Use browser menu → Install App</div>

<button id="compactToggle">Compact Mode: OFF</button>

<div class="tabs">
  <div class="tab active" id="tabLive">Live</div>
  <div class="tab" id="tabCompleted">Completed</div>
</div>

<div class="chart-container">
  <div class="chart-card"><canvas id="pickupChart"></canvas></div>
  <div class="chart-card"><canvas id="sparklineChart"></canvas></div>
</div>

<div id="cards"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* FIREBASE */
const app = initializeApp({
  apiKey:"AIzaSy...",
  databaseURL:"https://crew-app-e1315-default-rtdb.europe-west1.firebasedatabase.app"
});
const db = getDatabase(app);
const pickupsRef = ref(db,"pickups1");

/* STATE */
let pickupsData = {};
let currentTab = "live";

/* UI */
const cards = document.getElementById("cards");

/* COMPACT */
const compactToggle = document.getElementById("compactToggle");

if(localStorage.getItem("compactMode")==="on"){
  document.body.classList.add("compact");
  compactToggle.textContent="Compact Mode: ON";
}

compactToggle.onclick = () => {
  document.body.classList.toggle("compact");
  const isOn = document.body.classList.contains("compact");
  compactToggle.textContent = `Compact Mode: ${isOn ? "ON" : "OFF"}`;
  localStorage.setItem("compactMode", isOn ? "on" : "off");
};

/* TABS */
const tabLive = document.getElementById("tabLive");
const tabCompleted = document.getElementById("tabCompleted");

tabLive.onclick = () => {
  currentTab = "live";
  tabLive.classList.add("active");
  tabCompleted.classList.remove("active");
  render();
};

tabCompleted.onclick = () => {
  currentTab = "completed";
  tabCompleted.classList.add("active");
  tabLive.classList.remove("active");
  render();
};

/* INSTALL */
const installBtn = document.getElementById("installBtn");
const iosHint = document.getElementById("iosHint");
const desktopHint = document.getElementById("desktopHint");

let deferredPrompt;
const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isMobile = /android|iphone|ipad|ipod/i.test(navigator.userAgent);

if(!isMobile) desktopHint.style.display="block";

window.addEventListener('beforeinstallprompt',(e)=>{
  e.preventDefault();
  deferredPrompt=e;
});

installBtn.onclick = async () => {
  if(isIOS){
    iosHint.style.display="block";
  } else if(deferredPrompt){
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt=null;
  } else if(!isMobile){
    desktopHint.style.display="block";
  }
};

/* LOGOUT */
document.getElementById("logoutBtn").onclick = () => location.reload();

/* COMPLETE */
window.complete = function(id){
  update(ref(db,"pickups1/"+id),{
    status:"Completed",
    completedTime:new Date().toISOString()
  });
};

/* RENDER */
function render(){
  cards.innerHTML="";

  Object.entries(pickupsData).forEach(([id,p])=>{
    if(currentTab==="live" && p.status==="Completed") return;
    if(currentTab==="completed" && p.status!=="Completed") return;

    const card=document.createElement("div");
    card.className="card";

    card.innerHTML=`
      <strong>${p.flightNumber||""}</strong>
      <div>${p.type||""} • Stand ${p.stand||""}</div>
      <div>Crew: ${p.crew||""}</div>
      <span class="status-badge ${p.status==="Completed"?"status-completed":"status-pending"}">${p.status||"Pending"}</span>
      ${p.status!=="Completed" ? `<button onclick="complete('${id}')">Complete</button>` : ""}
    `;

    cards.appendChild(card);
  });
}

/* FIREBASE */
onValue(pickupsRef,snap=>{
  pickupsData=snap.val()||{};
  render();
});
</script>

</body>
</html>
