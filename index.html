<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>ABM Crew Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; margin:0; background:#f0f3f7; max-width:900px; margin:auto; transition:.3s; }

header { background:#007bff; color:white; padding:12px; display:flex; justify-content:space-between; }

.tabs { display:flex; }
.tab { flex:1; padding:10px; text-align:center; background:#ddd; cursor:pointer; }
.tab.active { background:white; font-weight:bold; }

button { padding:10px; border:none; border-radius:6px; cursor:pointer; }

#cards { padding:10px; display:flex; flex-wrap:wrap; gap:10px; }
.card { background:white; padding:10px; border-radius:10px; flex:1 1 48%; }

.card.alert { border-left:5px solid red; }
.card.completed { border-left:5px solid green; }

#kpiInfo {
  max-height:0;
  overflow:hidden;
  opacity:0;
  transition:.4s;
  background:white;
  margin:10px;
  padding:10px;
  border-radius:10px;
}
#kpiInfo.show {
  max-height:200px;
  opacity:1;
}

#collectedBar,#completedBar {
  height:6px;
  transition:width .5s;
}

canvas { max-height:200px; }
</style>
</head>

<body>

<header>
  <div>Pickup Dashboard</div>
  <button id="logoutBtn">Logout</button>
</header>

<button id="installBtn">Install</button>
<button id="compactBtn">Compact</button>

<div class="tabs">
  <div class="tab active" id="tabLive">Live</div>
  <div class="tab" id="tabCompleted">Completed</div>
</div>

<div style="padding:10px;">
  Total: <span id="totalJobs">0</span> |
  Pending: <span id="pendingJobs">0</span> |
  Completed: <span id="completedJobs">0</span>
  <button id="kpiBtn">KPI</button>
  Success: <span id="successPct">0</span>%
</div>

<div id="kpiInfo">
  Collected
  <div id="collectedBar" style="background:#28a745;width:0%"></div>
  Completed
  <div id="completedBar" style="background:#ffc107;width:0%"></div>
  <div>
    <span id="collectedPct">0%</span> |
    <span id="completedPct">0%</span>
  </div>
</div>

<canvas id="pickupChart"></canvas>
<canvas id="sparklineChart"></canvas>

<div id="cards"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* SAFE GET */
const el = id => document.getElementById(id);

/* FIREBASE */
const app = initializeApp({
  apiKey:"AIzaSy...",
  databaseURL:"https://crew-app-e1315-default-rtdb.europe-west1.firebasedatabase.app"
});
const db = getDatabase(app);
const pickupsRef = ref(db,"pickups1");

let data={}, currentTab="live";

/* CHARTS */
let pickupChart = new Chart(el("pickupChart"),{
  type:'doughnut',
  data:{
    labels:['Pending','KPI','Non-KPI'],
    datasets:[{data:[0,0,0], backgroundColor:['#FF6B6B','#28a745','#FFC107']}]
  }
});

let sparkChart = new Chart(el("sparklineChart"),{
  type:'line',
  data:{
    labels:Array.from({length:24},(_,i)=>i),
    datasets:[
      {label:'KPI', data:Array(24).fill(0), borderColor:'#28a745', fill:true},
      {label:'Non KPI', data:Array(24).fill(0), borderColor:'#ffc107', fill:true}
    ]
  }
});

/* SAFE COUNT */
function animate(elm,val){
  if(!elm) return;
  elm.textContent=val;
}

/* RENDER */
function render(){
try{
  let total=0,pending=0,completed=0,kpi=0,non=0;

  const hourlyKPI=Array(24).fill(0);
  const hourlyNon=Array(24).fill(0);

  Object.values(data||{}).forEach(p=>{
    const s=p?.status||"Pending";
    total++;

    if(s==="Pending") pending++;
    if(s==="Completed"){
      completed++;
      const ok=p?.collectedWithinKPI && p?.completedWithinKPI;
      if(ok){kpi++;} else {non++;}

      if(p?.pickupTime){
        const hr=new Date(p.pickupTime).getHours();
        if(ok) hourlyKPI[hr]++; else hourlyNon[hr]++;
      }
    }
  });

  animate(el("totalJobs"),total);
  animate(el("pendingJobs"),pending);
  animate(el("completedJobs"),completed);
  animate(el("successPct"), total?Math.round(kpi/total*100):0);

  /* KPI BARS */
  const collectedPct = total?Math.round(kpi/total*100):0;
  const completedPct = completed?Math.round(kpi/completed*100):0;

  if(el("collectedBar")) el("collectedBar").style.width=collectedPct+"%";
  if(el("completedBar")) el("completedBar").style.width=completedPct+"%";

  animate(el("collectedPct"),collectedPct+"%");
  animate(el("completedPct"),completedPct+"%");

  /* CARDS */
  const cards=el("cards");
  cards.innerHTML="";

  Object.entries(data||{}).forEach(([id,p])=>{
    const s=p?.status||"Pending";
    if(currentTab==="live" && s!=="Pending") return;
    if(currentTab==="completed" && s!=="Completed") return;

    const div=document.createElement("div");
    div.className="card";
    if(s==="Completed") div.classList.add("completed");

    div.innerHTML=`
      <b>${p.flightNumber||"N/A"}</b><br>
      ${s}<br>
      <button onclick="complete('${id}')">Complete</button>
    `;
    cards.appendChild(div);
  });

  /* CHART UPDATE */
  pickupChart.data.datasets[0].data=[pending,kpi,non];
  pickupChart.update();

  sparkChart.data.datasets[0].data=hourlyKPI;
  sparkChart.data.datasets[1].data=hourlyNon;
  sparkChart.update();

}catch(e){
  console.error("Render crash",e);
}
}

/* COMPLETE */
window.complete=function(id){
  try{
    const p=data[id]||{};
    update(ref(db,"pickups1/"+id),{
      ...p,
      status:"Completed",
      completedTime:new Date().toISOString()
    });
  }catch(e){console.error(e);}
}

/* EVENTS */
el("tabLive").onclick=()=>{currentTab="live";render();}
el("tabCompleted").onclick=()=>{currentTab="completed";render();}
el("kpiBtn").onclick=()=>el("kpiInfo").classList.toggle("show");
el("logoutBtn").onclick=()=>location.reload();

/* FIREBASE */
onValue(pickupsRef,snap=>{
  data=snap.val()||{};
  render();
});
</script>

</body>
</html>
