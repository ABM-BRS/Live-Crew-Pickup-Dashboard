<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>ABM Crew App</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
body { font-family: Arial; margin:0; background:#f4f6f8;}
#login { padding:20px; max-width:400px; margin:auto;}
#app { display:none; }
header { background:#007bff; color:white; padding:14px; text-align:center; position:relative;}
#logoutBtn { position:absolute; right:10px; top:10px; background:red; color:white; border:none; padding:6px 12px; }
.tabs { display:flex; }
.tab { flex:1; padding:12px; text-align:center; background:#ddd; cursor:pointer;}
.tab.active { background:white; color:#007bff;}
.card { background:white; margin:10px; padding:12px; border-radius:10px; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<h2>ABM Login</h2>
<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>
<button id="loginBtn">Login</button>
<div id="loginMsg"></div>
</div>

<!-- APP -->
<div id="app">
<header>
Pickup Dashboard
<button id="logoutBtn">Logout</button>
</header>

<div class="tabs">
<div class="tab active" onclick="switchTab('live', this)">Live</div>
<div class="tab" onclick="switchTab('completed', this)">Completed</div>
</div>

<div id="cards"></div>
</div>

<!-- LOGIN SCRIPT -->
<script>
document.getElementById("loginBtn").onclick = function () {
  const email = document.getElementById("email").value.toLowerCase();
  const password = document.getElementById("password").value;

  if (!email.endsWith("@abm.com")) return loginMsg.innerText="Use @abm.com";
  if (password !== "Adminbrs1") return loginMsg.innerText="Wrong password";

  localStorage.setItem("userEmail", email);
  login.style.display="none";
  app.style.display="block";
};

document.getElementById("logoutBtn").onclick = function(){
  localStorage.clear();
  location.reload();
};

if(localStorage.getItem("userEmail")){
  login.style.display="none";
  app.style.display="block";
}
</script>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCCehxMag_g2wXh7WzruvZyt9kdSJI4OpI",
  authDomain: "crew-app-e1315.firebaseapp.com",
  databaseURL: "https://crew-app-e1315-default-rtdb.europe-west1.firebasedatabase.app/",
  projectId: "crew-app-e1315",
  storageBucket: "crew-app-e1315.firebasestorage.app",
  messagingSenderId: "320647227664",
  appId: "1:320647227664:web:8de65c96c509d819a7dd95"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ✅ CORRECT NODE
const pickupsRef = ref(db, "pickups1");

let pickupsData = {};
let currentTab = "live";

// SWITCH TAB
window.switchTab = function(tab, el){
  currentTab = tab;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");
  render();
};

// RENDER
function render(){
  const cards = document.getElementById("cards");
  cards.innerHTML = "";

  console.log("Rendering:", pickupsData);

  Object.entries(pickupsData).forEach(([id,p])=>{

    // ✅ FIXED FILTER
    if(currentTab==="live" && p.status !== "Pending") return;
    if(currentTab==="completed" && p.status !== "Completed") return;

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <b>Flight ${p.flightNumber}</b><br>
      ${p.type} - Stand ${p.stand}<br>
      Crew: ${p.crew}<br>
      Pickup: ${p.pickupTime || ""}<br>
      Completed: ${p.completedTime || ""}<br>
      Status: ${p.status}<br>
      ${p.status==="Pending" ? `<button onclick="complete('${id}')">Complete</button>` : ""}
    `;

    cards.appendChild(card);
  });

  if(cards.innerHTML===""){
    cards.innerHTML="<p>No pickups in this tab</p>";
  }
}

// COMPLETE BUTTON
window.complete = function(id){
  const now = new Date().toISOString();

  update(ref(db,"pickups1/"+id),{
    status:"Completed",
    completedTime: now
  });
};

// LOAD DATA
onValue(pickupsRef, snap=>{
  const data = snap.val();

  console.log("Firebase data:", data);

  pickupsData = data || {};

  render();
}, err=>{
  console.error("Firebase error:", err);
});
</script>

</body>
</html>
