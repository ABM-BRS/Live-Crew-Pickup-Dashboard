<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* CONFIG */
const ALERT_MINUTES = 5, KPI_MINUTES = 7, JOURNEY_MINUTES = 10, REMOVE_AFTER_HOURS = 12;
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzlPzzO3_JIBZUk8hGcJpFG0m4jG5RZ_dtBR-gEy_E-jGCz4tJPmjY9xpuO0MQJXYTL/exec";

/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyCCehxMag_g2wXh7WzruvZyt9kdSJI4OpI",
  authDomain: "crew-app-e1315.firebaseapp.com",
  databaseURL: "https://crew-app-e1315-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "crew-app-e1315",
};
const appFirebase = initializeApp(firebaseConfig);
const db = getDatabase(appFirebase);
const auth = getAuth();
signInAnonymously(auth).then(() => console.log("Signed in anonymously")).catch(err => console.error(err));

/* VARIABLES */
const cards = document.getElementById("cards");
const tabLive = document.getElementById("tabLive");
const tabCompleted = document.getElementById("tabCompleted");
const tabDeleted = document.getElementById("tabDeleted");
let currentTab = "live", pickupsData = {}, compactLevel = 0, adminMode = false;
let deferredPrompt = null;

/* PWA INSTALL PROMPT */
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById("installBtn").style.display = "block";
});
document.getElementById("installBtn").onclick = async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    if (outcome === 'accepted') document.getElementById("installBtn").style.display = "none";
    deferredPrompt = null;
  } else alert("Use browser menu: Add to Home Screen.");
};

/* TABS */
function switchTab(tab) {
  currentTab = tab;
  tabLive.classList.toggle("active", tab === "live");
  tabCompleted.classList.toggle("active", tab === "completed");
  tabDeleted.classList.toggle("active", tab === "deleted");
  document.getElementById("kpiLive").style.display = tab === "live" ? "flex" : "none";
  document.getElementById("kpiCompleted").style.display = tab === "completed" ? "flex" : "none";
  document.getElementById("kpiDeleted").style.display = tab === "deleted" ? "flex" : "none";
  render();
}
tabLive.onclick = () => switchTab("live");
tabCompleted.onclick = () => switchTab("completed");
tabDeleted.onclick = () => switchTab("deleted");

/* ADMIN MODE */
document.getElementById("adminBtn").onclick = () => {
  const pw = prompt("Enter admin password:");
  if (pw === "crewlock1") { adminMode = !adminMode; alert("Admin mode " + (adminMode ? "ON" : "OFF")); render(); }
  else alert("Incorrect password");
};

/* BUTTON ACTIONS WITH AUDIT */
window.collect = id => {
  const now = new Date().toISOString();
  update(ref(db, "pickups1/" + id), { status: "Collected", actualCollectionTime: now })
    .then(() => sendAudit(id, "Collected", now));
};
window.complete = id => {
  const now = new Date().toISOString();
  update(ref(db, "pickups1/" + id), { status: "Completed", completedTime: now })
    .then(() => sendAudit(id, "Completed", now));
};
window.deleteJob = id => {
  if (confirm("Delete this job?")) {
    const now = new Date().toISOString();
    remove(ref(db, "pickups1/" + id))
      .then(() => sendAudit(id, "Deleted", now));
  }
};

/* SEND AUDIT TO GOOGLE SHEET */
function sendAudit(jobId, action, timestamp) {
  const job = pickupsData[jobId] || {};
  const payload = {};
  payload[jobId] = {
    auditAction: action,
    auditTime: timestamp,
    status: job.status || "",
    crew: job.crew || "",
    stand: job.stand || "",
    type: job.type || "",
    flightNumber: job.flightNumber || "",
    requestedTime: job.requestedTime || "",
    actualCollectionTime: job.actualCollectionTime || "",
    completedTime: job.completedTime || ""
  };

  fetch(GOOGLE_SCRIPT_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  })
  .then(res => res.json())
  .then(data => console.log("Audit logged:", data))
  .catch(err => console.error("Error logging audit:", err));
}

/* SYNC FULL DATA TO GOOGLE SHEET */
function syncToGoogleSheet() {
  const payload = {};
  Object.entries(pickupsData).forEach(([id, job]) => {
    payload[id] = {
      crew: job.crew || "",
      stand: job.stand || "",
      type: job.type || "",
      flightNumber: job.flightNumber || job.flightNo || "",
      requestedTime: job.requestedTime || "",
      actualCollectionTime: job.actualCollectionTime || "",
      completedTime: job.completedTime || "",
      status: job.status || "Pending"
    };
  });
  fetch(GOOGLE_SCRIPT_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  }).catch(err => console.error("Error syncing to Google Sheet:", err));
}

/* RENDER FUNCTION */
function render() {
  cards.innerHTML = "";
  let list = [], totalJobs = 0, pending = 0, completedCount = 0, completedSuccess = 0, completedFailed = 0, deletedCount = 0;
  let totalPending = 0, pendingWithinKPI = 0, pendingOverdue = 0;

  Object.entries(pickupsData).forEach(([id, p]) => {
    const pickupTime = p.requestedTime ? new Date(p.requestedTime) : null;
    const collectionTime = p.actualCollectionTime ? new Date(p.actualCollectionTime) : null;
    const completedTime = p.completedTime ? new Date(p.completedTime) : null;
    const status = p.status || "Pending";

    if (pickupTime && (Date.now() - pickupTime.getTime() > REMOVE_AFTER_HOURS * 3600 * 1000)) { remove(ref(db, "pickups1/" + id)); return; }
    if (currentTab === "live" && status === "Completed") return;
    if (currentTab === "completed" && status !== "Completed") return;
    if (currentTab === "deleted" && status !== "Deleted") return;

    let duration = 0;
    if (status === "Pending" && pickupTime) duration = Date.now() - pickupTime;
    else if (status === "Collected" && collectionTime) duration = Date.now() - collectionTime;
    else if (status === "Completed" && completedTime && pickupTime) duration = completedTime - pickupTime;

    list.push({ id, p, status, duration, pickupTime, collectionTime, completedTime });
    if (status === "Deleted") { deletedCount++; return; }

    totalJobs++;
    if (status === "Pending" || status === "Collected") { pending++; totalPending++; }
    if (status === "Pending" && pickupTime && duration <= KPI_MINUTES * 60000) pendingWithinKPI++;
    if (status === "Pending" && pickupTime && duration > KPI_MINUTES * 60000) pendingOverdue++;
    if (status === "Completed") completedCount++;
    if (status === "Completed" && collectionTime && completedTime) {
      const collectedDur = collectionTime - pickupTime;
      const journeyDur = completedTime - collectionTime;
      if (collectedDur <= KPI_MINUTES * 60000 && journeyDur <= JOURNEY_MINUTES * 60000) completedSuccess++;
      else completedFailed++;
    }
  });

  list.sort((a, b) => b.duration - a.duration);

  // KPI DISPLAY
  if (currentTab === "live") {
    document.getElementById("totalJobs").textContent = totalJobs;
    document.getElementById("pendingJobs").textContent = pending;
    document.getElementById("withinKPI").textContent = pendingWithinKPI;
    document.getElementById("overdue").textContent = pendingOverdue;
  } else if (currentTab === "completed") {
    document.getElementById("totalCompletedJobs").textContent = completedCount;
    document.getElementById("completedSuccess").textContent = completedSuccess;
    document.getElementById("completedFailed").textContent = completedFailed;
  } else if (currentTab === "deleted") {
    document.getElementById("totalDeletedJobs").textContent = deletedCount;
  }

  const successPctEl = document.getElementById("successPct");
  const successPct = currentTab === "live" ? Math.round((pendingWithinKPI / totalPending) * 100 || 0)
    : currentTab === "completed" ? Math.round((completedSuccess / (completedSuccess + completedFailed)) * 100 || 0)
    : 0;
  successPctEl.textContent = successPct;
  successPctEl.style.color = currentTab === "live"
    ? (successPct === 100 ? "#4CAF50" : "#FF6B6B")
    : (successPct >= 98 ? "#4CAF50" : successPct >= 95 ? "#FFC107" : "#FF6B6B");

  // CARDS
  list.forEach(({ id, p, status, duration, pickupTime, collectionTime }) => {
    const card = document.createElement("div");
    card.className = "card";
    if (status === "Completed") card.classList.add("completed");
    if (status === "Deleted") card.classList.add("deleted");

    const durationEl = document.createElement("span");
    durationEl.className = "duration-badge";
    durationEl.dataset.id = id;

    const updateDuration = () => {
      let elapsed = 0, alert = false, durationText = "", durationColor = "#ff9800";
      if (status === "Pending" && pickupTime) elapsed = Date.now() - pickupTime;
      else if (status === "Collected" && collectionTime) elapsed = Date.now() - collectionTime;

      const formatTime = ms => {
        const t = Math.floor(ms / 1000);
        const minutes = Math.floor(t / 60).toString().padStart(2, '0');
        const seconds = (t % 60).toString().padStart(2, '0');
        return minutes + ":" + seconds;
      };

      if (status === "Pending" && pickupTime) {
        const diff = elapsed - KPI_MINUTES * 60000;
        durationText = formatTime(Math.abs(diff));
        durationColor = diff < 0 ? "#4CAF50" : "#FF6B6B";
        alert = diff > 0;
      } else if (status === "Collected" && collectionTime) {
        durationText = formatTime(elapsed);
        if (elapsed > JOURNEY_MINUTES * 60000) { durationColor = "#FF6B6B"; alert = true; }
        else if (elapsed > JOURNEY_MINUTES * 0.7 * 60000) durationColor = "#FFA726";
        else durationColor = "#4CAF50";
      }

      durationEl.textContent = durationText;
      durationEl.style.background = durationColor;
      if (alert) card.classList.add("alert");
      else card.classList.remove("alert");
    };
    updateDuration();
    setInterval(updateDuration, 1000);

    let buttonHTML = "";
    if (status === "Pending") buttonHTML = `<button onclick="collect('${id}')">Collect</button>`;
    else if (status === "Collected") buttonHTML = `<button onclick="complete('${id}')">Complete</button>`;
    if (adminMode) buttonHTML += `<button onclick="deleteJob('${id}')">Delete Job</button>`;

    card.innerHTML = `
      <div style="display:flex; flex-direction:column; align-items:center; gap:4px;"></div>
      <div style="margin-top:8px;">${p.type || ""} • Stand ${p.stand || ""}</div>
      <div style="margin-top:6px; font-size:14px; color:#555;">Crew: ${p.crew || ""}</div>
      ${buttonHTML}`;
    card.querySelector("div").appendChild(durationEl);
    cards.appendChild(card);
  });

  updateCharts();
}

/* CHARTS SETUP */
const pickupCtx = document.getElementById('pickupChart').getContext('2d');
const pickupChart = new Chart(pickupCtx, {
  type: 'doughnut',
  data: { labels: ['Pending', 'Collected', 'Completed'], datasets: [{ data: [0, 0, 0], backgroundColor: ['#FF6B6B', '#FFA726', '#4CAF50'] }] },
  options: { plugins: { legend: { position: 'bottom' } } }
});

const sparkCtx = document.getElementById('sparklineChart').getContext('2d');
const sparkChart = new Chart(sparkCtx, {
  type: 'line',
  data: { labels: [], datasets: [{ label: 'Jobs per Hour', data: [], borderColor: '#007bff', fill: false, tension: 0.3 }] },
  options: { plugins: { legend: { display: false } }, scales: { x: { display: true }, y: { display: true } } }
});

function updateCharts() {
  const statusCounts = { Pending: 0, Collected: 0, Completed: 0 };
  const jobsByHour = Array(24).fill(0);

  Object.values(pickupsData).forEach(p => {
    const status = p.status || "Pending";
    if (statusCounts[status] !== undefined) statusCounts[status]++;
    if (p.completedTime) jobsByHour[new Date(p.completedTime).getHours()]++;
  });

  pickupChart.data.datasets[0].data = [statusCounts.Pending, statusCounts.Collected, statusCounts.Completed];
  pickupChart.update();

  sparkChart.data.labels = Array.from({ length: 24 }, (_, i) => i + ":00");
  sparkChart.data.datasets[0].data = jobsByHour;
  sparkChart.update();
}

/* FETCH PICKUPS FROM FIREBASE */
onValue(ref(db, "pickups1"), snapshot => {
  pickupsData = snapshot.val() || {};
  Object.entries(pickupsData).forEach(([id, job]) => {
    if (!job.requestedTime) {
      job.requestedTime = job.startTime || new Date().toISOString();
      update(ref(db, "pickups1/" + id), { requestedTime: job.requestedTime });
    }
  });
  render();
});

/* COMPACT MODE */
document.getElementById("compactBtn").onclick = () => {
  compactLevel = (compactLevel + 1) % 3;
  document.body.style.transform = compactLevel === 1 ? "scale(0.85)" :
    compactLevel === 2 ? "scale(0.7)" : "";
};

/* LOGOUT */
document.getElementById("logoutBtn").onclick = () => auth.signOut().then(() => location.reload());
</script>
