<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ABM Crew App - Test</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; margin:0; background:#f4f6f8; }
/* Login */
#login { padding:20px; max-width:400px; margin:auto; }
input { width:100%; padding:10px; margin:5px 0; }
button { width:100%; padding:10px; margin-top:10px; background:#007bff; color:white; border:none; border-radius:6px; }
/* App */
#app { display:none; }
header { background:#007bff; color:white; padding:12px; text-align:center; }
/* Tabs */
.tabs { display:flex; }
.tab { flex:1; padding:10px; text-align:center; background:#ddd; cursor:pointer; }
.tab.active { background:white; font-weight:bold; }
/* Cards */
#cards { padding:10px; }
.card { background:white; margin-bottom:10px; padding:10px; border-radius:8px; }
.status { padding:4px 8px; border-radius:6px; }
.pending { background:#ffc107; }
.completed { background:#28a745; color:white; }
/* Install button */
#installBtn { display:none; width:95%; margin:10px auto; padding:10px; background:#007bff; color:white; border:none; border-radius:8px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <h2>ABM Login (Test)</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <div id="loginMsg"></div>
</div>

<!-- APP -->
<div id="app">
  <header>Pickup Dashboard</header>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('live', this)">Live</div>
    <div class="tab" onclick="switchTab('completed', this)">Completed</div>
  </div>
  <div id="cards"></div>
</div>

<script>
// Simulated pickups data
let pickupsData = {
  "1": { flightNumber:"AB123", type:"Arrival", stand:"5", crew:"John", assignedCrew:"john@abm.com", status:"Pending" },
  "2": { flightNumber:"CD456", type:"Departure", stand:"3", crew:"Mike", assignedCrew:"mike@abm.com", status:"Completed" }
};

let role = "crew";
let userEmail = "";
let currentTab = "live";

function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if (!email.endsWith("@abm.com")) {
    loginMsg.innerHTML = "<p style='color:red;'>Use your @abm.com email</p>";
    return;
  }

  if (password !== "Adminbrs1") {
    loginMsg.innerHTML = "<p style='color:red;'>Wrong password</p>";
    return;
  }

  userEmail = email;
  const admins = ["manager@abm.com","supervisor@abm.com"];
  role = admins.includes(email) ? "admin" : "crew";

  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";

  render();
}

function switchTab(tab, el){
  currentTab = tab;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");
  render();
}

function render() {
  const cards = document.getElementById("cards");
  cards.innerHTML = "";
  Object.entries(pickupsData).forEach(([key,p])=>{
    if(role==="crew" && p.assignedCrew !== userEmail) return;
    if(currentTab==="live" && p.status !== "Pending") return;
    if(currentTab==="completed" && p.status !== "Completed") return;

    const card = document.createElement("div");
    card.className="card";
    card.innerHTML=`
      <b>${p.flightNumber}</b><br>
      ${p.type} - Stand ${p.stand}<br>
      Crew: ${p.crew}<br>
      Assigned: ${p.assignedCrew}<br>
      Status: <span class="${p.status==="Completed"?"completed":"pending"}">${p.status}</span>
      ${((role==="admin")||(role==="crew" && p.status==="Pending"))?
        `<button onclick="completePickup('${key}')">Complete</button>`:""
      }
    `;
    cards.appendChild(card);
  });
}

function completePickup(id){
  pickupsData[id].status = "Completed";
  render();
}
</script>

</body>
</html>
