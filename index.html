<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>ABM Crew Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#007bff">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  margin:0;
  background:#f0f3f7;
  max-width:900px;
  margin:auto;
}

header {
  background:#007bff;
  color:white;
  padding:12px;
  display:flex;
  justify-content:space-between;
}

.tabs { display:flex; }
.tab { flex:1; padding:12px; text-align:center; cursor:pointer; }
.tab.active { background:white; color:#007bff; }

.chart-container {
  display:flex;
  gap:20px;
  flex-wrap:wrap;
  margin:12px;
}
.chart-card {
  flex:1 1 45%;
  background:white;
  padding:12px;
  border-radius:12px;
}

#cards { margin:12px; }

.card {
  background:white;
  padding:12px;
  margin-bottom:10px;
  border-radius:12px;
}

.status-badge { padding:4px 10px; border-radius:12px; color:white; font-size:12px; }
.status-pending { background:#FF6B6B; }
.status-completed { background:#4CAF50; }

#kpiInfo { display:none; background:white; padding:10px; margin:10px; border-radius:10px; }
</style>
</head>

<body>

<header>
  <div>Pickup Dashboard</div>
  <button id="logoutBtn">Logout</button>
</header>

<div class="tabs">
  <div class="tab active" id="tabLive">Live</div>
  <div class="tab" id="tabCompleted">Completed</div>
</div>

<div style="padding:10px;">
  Total Jobs: <span id="totalJobs">0</span> |
  Pending: <span id="pendingJobs">0</span> |
  Completed: <span id="completedJobs">0</span>
  <button id="kpiBtn">Collection KPI's</button>
  Success KPI: <span id="successPct">0</span>%
</div>

<div id="kpiInfo">
  <div>Collected KPI</div>
  <div id="collectedBar" style="height:6px;background:#28a745;width:0%"></div>

  <div style="margin-top:8px;">Completed KPI</div>
  <div id="completedBar" style="height:6px;background:#ffc107;width:0%"></div>

  <div style="margin-top:6px;">
    <span id="collectedPct">0%</span> |
    <span id="completedPct">0%</span>
  </div>
</div>

<div class="chart-container">
  <div class="chart-card"><canvas id="pickupChart"></canvas></div>
  <div class="chart-card"><canvas id="sparklineChart"></canvas></div>
</div>

<div id="cards"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* FIREBASE */
const app = initializeApp({
  apiKey: "AIzaSy...",
  databaseURL: "https://crew-app-e1315-default-rtdb.europe-west1.firebasedatabase.app"
});
const db = getDatabase(app);
const pickupsRef = ref(db, "pickups1");

/* DOM */
const cards = document.getElementById("cards");
const tabLive = document.getElementById("tabLive");
const tabCompleted = document.getElementById("tabCompleted");

const totalJobsEl = document.getElementById("totalJobs");
const pendingJobsEl = document.getElementById("pendingJobs");
const completedJobsEl = document.getElementById("completedJobs");
const successPctEl = document.getElementById("successPct");

const kpiBtn = document.getElementById("kpiBtn");
const kpiInfo = document.getElementById("kpiInfo");

const collectedBar = document.getElementById("collectedBar");
const completedBar = document.getElementById("completedBar");
const collectedPctEl = document.getElementById("collectedPct");
const completedPctEl = document.getElementById("completedPct");

/* STATE */
let pickupsData = {};
let currentTab = "live";

/* KPI FUNCTION */
function getKPI(p){
  if(!p.pickupTime || !p.completedTime) return {collected:false,completed:false};
  const mins = (new Date(p.completedTime) - new Date(p.pickupTime)) / 60000;
  return {
    collected: mins <= 7,
    completed: mins <= 10
  };
}

/* CHARTS */
const pickupChart = new Chart(document.getElementById("pickupChart"),{
  type:'doughnut',
  data:{
    labels:['Pending','KPI','Non-KPI'],
    datasets:[{data:[0,0,0],backgroundColor:['#FF6B6B','#4CAF50','#ffc107']}]
  }
});

const sparklineChart = new Chart(document.getElementById("sparklineChart"),{
  type:'line',
  data:{
    labels:Array.from({length:24},(_,i)=>`${i}:00`),
    datasets:[{
      data:Array(24).fill(0),
      borderColor:'#007bff',
      fill:true
    }]
  }
});

/* RENDER */
function render(){
  let total=0,pending=0,completed=0,success=0;
  let collectedOK=0, completedOK=0;

  cards.innerHTML="";

  Object.entries(pickupsData).forEach(([id,p])=>{
    const status=p.status||"Pending";

    // GLOBAL COUNTS
    total++;
    if(status==="Pending") pending++;
    if(status==="Completed"){
      completed++;

      const kpi=getKPI(p);
      if(kpi.collected) collectedOK++;
      if(kpi.completed) completedOK++;
      if(kpi.collected && kpi.completed) success++;
    }

    // FILTER
    if(currentTab==="live" && status!=="Pending") return;
    if(currentTab==="completed" && status!=="Completed") return;

    const div=document.createElement("div");
    div.className="card";

    let badge="";
    if(status==="Completed"){
      const kpi=getKPI(p);
      badge = `<span class="status-badge" style="background:${(kpi.collected&&kpi.completed)?'#4CAF50':'#ffc107'}">
        ${(kpi.collected&&kpi.completed)?"✓ KPI":"✗ KPI"}
      </span>`;
    }

    div.innerHTML=`
      <b>${p.flightNumber||"N/A"}</b>
      <span class="status-badge ${status==="Completed"?"status-completed":"status-pending"}">${status}</span>
      ${badge}
      <br>${p.type||""}
      <br>${status!=="Completed"?`<button onclick="complete('${id}')">Complete</button>`:""}
    `;

    cards.appendChild(div);
  });

  // KPI UI
  totalJobsEl.textContent=total;
  pendingJobsEl.textContent=pending;
  completedJobsEl.textContent=completed;
  successPctEl.textContent=total?Math.round(success/total*100):0;

  const collectedPct = total?Math.round(collectedOK/total*100):0;
  const completedPct = completed?Math.round(completedOK/completed*100):0;

  collectedBar.style.width=collectedPct+"%";
  completedBar.style.width=completedPct+"%";
  collectedPctEl.textContent=collectedPct+"%";
  completedPctEl.textContent=completedPct+"%";

  // CHART
  pickupChart.data.datasets[0].data=[pending,success,completed-success];
  pickupChart.update();
}

/* COMPLETE */
window.complete=function(id){
  const p=pickupsData[id];
  update(ref(db,"pickups1/"+id),{
    ...p,
    status:"Completed",
    completedTime:new Date().toISOString()
  });
}

/* EVENTS */
tabLive.onclick=()=>{currentTab="live";render();}
tabCompleted.onclick=()=>{currentTab="completed";render();}
kpiBtn.onclick=()=>kpiInfo.style.display = kpiInfo.style.display==="block"?"none":"block";
document.getElementById("logoutBtn").onclick=()=>location.reload();

/* FIREBASE */
onValue(pickupsRef,snap=>{
  pickupsData=snap.val()||{};
  render();
});
</script>

</body>
</html>
