<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>ABM Crew App</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
body { font-family: Arial; margin:0; background:#f4f6f8;}
#login { padding:20px; max-width:400px; margin:auto;}
#app { display:none; }
header { background:#007bff; color:white; padding:14px; text-align:center; position:relative;}
#logoutBtn { position:absolute; right:10px; top:10px; background:red; color:white; border:none; padding:6px 12px; cursor:pointer; }
.tabs { display:flex; }
.tab { flex:1; padding:12px; text-align:center; background:#ddd; cursor:pointer; user-select:none; }
.tab.active { background:white; color:#007bff; }
.card { background:white; margin:10px; padding:12px; border-radius:10px; }
button { cursor:pointer; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<h2>ABM Login</h2>
<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>
<button id="loginBtn">Login</button>
<div id="loginMsg"></div>
</div>

<!-- APP -->
<div id="app">
<header>
Pickup Dashboard
<button id="logoutBtn">Logout</button>
</header>

<div class="tabs">
  <div class="tab" id="tabLive">Live</div>
  <div class="tab" id="tabCompleted">Completed</div>
</div>

<div id="cards"></div>
</div>

<!-- LOGIN SCRIPT -->
<script>
const login = document.getElementById("login");
const app = document.getElementById("app");
const loginMsg = document.getElementById("loginMsg");

document.getElementById("loginBtn").onclick = function () {
  const email = document.getElementById("email").value.toLowerCase();
  const password = document.getElementById("password").value;

  if (!email.endsWith("@abm.com")) {
    loginMsg.innerText = "Use @abm.com";
    return;
  }
  if (password !== "Adminbrs1") {
    loginMsg.innerText = "Wrong password";
    return;
  }

  localStorage.setItem("userEmail", email);
  login.style.display = "none";
  app.style.display = "block";
};

document.getElementById("logoutBtn").onclick = function(){
  localStorage.clear();
  location.reload();
};

if(localStorage.getItem("userEmail")){
  login.style.display = "none";
  app.style.display = "block";
}
</script>

<!-- FIREBASE SCRIPT -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

console.log("🔥 SCRIPT LOADED");

const firebaseConfig = {
  apiKey: "AIzaSyCCehxMag_g2wXh7WzruvZyt9kdSJI4OpI",
  authDomain: "crew-app-e1315.firebaseapp.com",
  databaseURL: "https://crew-app-e1315-default-rtdb.europe-west1.firebasedatabase.app/",
  projectId: "crew-app-e1315",
  storageBucket: "crew-app-e1315.firebasestorage.app",
  messagingSenderId: "320647227664",
  appId: "1:320647227664:web:8de65c96c509d819a7dd95"
};

const appFirebase = initializeApp(firebaseConfig);
const db = getDatabase(appFirebase);
const pickupsRef = ref(db, "pickups1");

let pickupsData = {};
let currentTab = "live";

// SWITCH TAB FUNCTION
window.switchTab = function(tab, el){
  currentTab = tab;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");
  render();
};

// RENDER FUNCTION (handles missing status)
function render(){
  const cards = document.getElementById("cards");
  cards.innerHTML = "";

  const entries = Object.entries(pickupsData);
  let visible = 0;

  entries.forEach(([id, p])=>{
    const status = p.status || "Pending"; // Default Pending if missing

    if(currentTab==="live" && status !== "Pending") return;
    if(currentTab==="completed" && status !== "Completed") return;

    visible++;

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <b>Flight ${p.flightNumber || "N/A"}</b><br>
      ${p.type || ""} - Stand ${p.stand || ""}<br>
      Crew: ${p.crew || ""}<br>
      Pickup: ${p.pickupTime || ""}<br>
      Completed: ${p.completedTime || ""}<br>
      Status: ${status}<br>
      ${status==="Pending" ? `<button onclick="complete('${id}')">Complete</button>` : ""}
    `;

    cards.appendChild(card);
  });

  if(visible === 0){
    cards.innerHTML = currentTab === "live"
      ? "<p>No LIVE pickups (all jobs completed)</p>"
      : "<p>No completed pickups</p>";
  }
}

// COMPLETE BUTTON
window.complete = function(id){
  const now = new Date().toISOString();
  update(ref(db,"pickups1/"+id),{
    status:"Completed",
    completedTime: now
  });
};

// LOAD DATA FROM FIREBASE
onValue(pickupsRef, snap=>{
  const data = snap.val();
  console.log("🔥 Firebase raw data:", data);
  pickupsData = data || {};
  render();
}, err=>{
  console.error("❌ Firebase error:", err);
});

// DOMContentLoaded ensures tabs are clickable
document.addEventListener("DOMContentLoaded", () => {
  const tabLive = document.getElementById("tabLive");
  const tabCompleted = document.getElementById("tabCompleted");

  tabLive.addEventListener("click", () => switchTab("live", tabLive));
  tabCompleted.addEventListener("click", () => switchTab("completed", tabCompleted));

  if(localStorage.getItem("userEmail")){
    login.style.display="none";
    app.style.display="block";
    switchTab("completed", tabCompleted);
  }
});
</script>

</body>
</html>
